<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — GlobalWays Customer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/globalways.css" rel="stylesheet">
</head>
<body class="bg-warm">
  <div class="dashboard-wrapper d-flex">
    <aside class="dashboard-sidebar d-flex flex-column">
      <div class="p-3 border-bottom border-secondary border-opacity-25 d-flex align-items-center justify-content-between">
        <a href="../index.html" class="text-decoration-none d-flex align-items-center gap-2">
          <div class="rounded-2 d-flex align-items-center justify-content-center" style="width:32px;height:32px;background:linear-gradient(135deg,#1165EF,#3F83F4)"><i class="bi bi-globe2 text-white small"></i></div>
          <div><div class="text-white font-serif small">GlobalWays</div><div class="font-mono text-uppercase" style="font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.4)">Customer Portal</div></div>
        </a>
        <button class="btn btn-link text-white-50 p-0 d-lg-none" data-sidebar-close><i class="bi bi-x-lg"></i></button>
      </div>
      <div class="p-3 border-bottom border-secondary border-opacity-25">
        <div class="d-flex align-items-center gap-2 p-2 rounded-3" style="background:rgba(255,255,255,.05)">
          <span class="avatar-circle bg-dark border border-secondary">AH</span>
          <div class="min-w-0"><div class="text-white small fw-semibold text-truncate">Ahmed Hassan</div><div class="font-mono text-truncate" style="font-size:10px;color:rgba(255,255,255,.4)">ahmed@example.com</div></div>
        </div>
      </div>
      <nav class="nav flex-column p-3 gap-1 flex-grow-1">
        <div class="font-mono text-uppercase px-2 mb-2" style="font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.25)">Menu</div>
        <a class="nav-link" href="index.html"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <a class="nav-link" href="applications.html"><i class="bi bi-file-earmark-text"></i> Applications</a>
        <a class="nav-link" href="documents.html"><i class="bi bi-folder2-open"></i> Documents</a>
        <a class="nav-link" href="messages.html"><i class="bi bi-chat-dots"></i> Messages <span class="badge rounded-pill">3</span></a>
        <a class="nav-link" href="payments.html"><i class="bi bi-credit-card"></i> Payments</a>
        <a class="nav-link active" href="profile.html"><i class="bi bi-person"></i> Profile</a>
      </nav>
      <div class="p-3 border-top border-secondary border-opacity-25"><a class="nav-link" href="../index.html"><i class="bi bi-box-arrow-left"></i> Back to Home</a></div>
    </aside>
    <div class="sidebar-backdrop"></div>
    <div class="dashboard-main">
      <header class="dashboard-topbar d-flex align-items-center justify-content-between gap-3">
        <div class="d-flex align-items-center gap-3 flex-grow-1">
          <button class="btn btn-light d-lg-none" data-sidebar-toggle><i class="bi bi-list"></i></button>
        </div>
        <div class="d-flex align-items-center gap-2"><button class="btn btn-light"><i class="bi bi-bell"></i></button><span class="avatar-circle bg-dark">AH</span></div>
      </header>
      <main class="p-4 p-lg-5">
        <div class="mb-4"><h1 class="font-serif h2 mb-1">Profile Settings</h1><p class="text-muted mb-0">Manage your account information and preferences</p></div>
        <div class="row g-4">
          <div class="col-lg-8">
            <div class="card border-0 shadow-sm mb-4">
              <div class="card-header bg-white border-bottom"><h2 class="h6 mb-0">Personal Information</h2></div>
              <div class="card-body">
                <form>
                  <div class="row g-3">
                    <div class="col-md-6"><label class="form-label small">First Name</label><input type="text" class="form-control" value="Ahmed"></div>
                    <div class="col-md-6"><label class="form-label small">Last Name</label><input type="text" class="form-control" value="Hassan"></div>
                    <div class="col-md-6"><label class="form-label small">Email</label><input type="email" class="form-control" value="ahmed@example.com"></div>
                    <div class="col-md-6"><label class="form-label small">Phone</label><input type="tel" class="form-control" value="+971 50 123 4567"></div>
                    <div class="col-12"><label class="form-label small">Nationality</label><select class="form-select"><option selected>United Arab Emirates</option><option>India</option><option>Pakistan</option><option>United Kingdom</option></select></div>
                    <div class="col-12"><label class="form-label small">Address</label><textarea class="form-control" rows="2">Dubai Marina, Dubai, UAE</textarea></div>
                  </div>
                </form>
              </div>
            </div>
            <div class="card border-0 shadow-sm">
              <div class="card-header bg-white border-bottom"><h2 class="h6 mb-0">Security</h2></div>
              <div class="card-body">
                <div class="row g-3">
                  <div class="col-md-6"><label class="form-label small">Current Password</label><input type="password" class="form-control"></div>
                  <div class="col-md-6"><label class="form-label small">New Password</label><input type="password" class="form-control"></div>
                  <div class="col-md-6"><label class="form-label small">Confirm Password</label><input type="password" class="form-control"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card border-0 shadow-sm mb-4">
              <div class="card-body text-center">
                <span class="avatar-circle bg-dark d-inline-flex mb-3" style="width:4rem;height:4rem;font-size:1rem">AH</span>
                <div class="fw-semibold">Ahmed Hassan</div>
                <div class="text-muted small mb-3">Customer since Jan 2026</div>
                <button class="btn btn-outline-secondary btn-sm rounded-pill">Change Photo</button>
              </div>
            </div>
            <div class="card border-0 shadow-sm mb-4">
              <div class="card-header bg-white border-bottom"><h3 class="h6 mb-0">Notifications</h3></div>
              <div class="card-body">
                <div class="form-check form-switch mb-2"><input class="form-check-input" type="checkbox" id="n1" checked><label class="form-check-label small" for="n1">Email notifications</label></div>
                <div class="form-check form-switch mb-2"><input class="form-check-input" type="checkbox" id="n2" checked><label class="form-check-label small" for="n2">SMS alerts</label></div>
                <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="n3"><label class="form-check-label small" for="n3">Marketing emails</label></div>
              </div>
            </div>
            <button class="btn btn-primary w-100 rounded-pill">Save Changes</button>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
